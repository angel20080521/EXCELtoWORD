name: Deploy Python Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # 从 GitHub 仓库 Secrets 中读取安全密钥
      COZE_API_KEY: ${{ secrets.COZE_API_KEY }}
      # 如果你希望通过环境变量方式传入脚本参数，也可以在仓库 Secrets 中定义下面两个变量
      EXCEL_PATH: ${{ secrets.EXCEL_PATH }}
      WORD_TEMPLATE_PATH: ${{ secrets.WORD_TEMPLATE_PATH }}
      OUTPUT_DIR: ${{ github.workspace }}/output

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r projects/requirements.txt

      - name: Verify COZE_API_KEY is available
        run: |
          if [ -z "$COZE_API_KEY" ]; then
            echo 'Error: COZE_API_KEY is not set. Please add it to repository secrets.'
            exit 1
          fi
          echo 'COZE_API_KEY is set in environment.'

      - name: Run entry Python script
        run: |
          python projects/scripts/process_excel_word.py
